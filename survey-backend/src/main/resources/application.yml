server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: survey-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/survey_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root123456
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB
  web:
    resources:
      static-locations: file:./uploads/,classpath:/static/

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: SurveySystemJwtSecretKey2024VeryLongAndSecureKeyForHS256Algorithm
  expiration: 86400000
  refresh-expiration: 604800000

file:
  upload-dir: ./uploads
  base-url: http://localhost:8080/api/files

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.survey: debug
    com.survey.mapper: debug
